upstream mock_services {
    server mock-lista-espera:8081;
    server mock-reasignacion:8082;
    server mock-notificaciones:8083;
}

server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /actuator/health {
        access_log /var/log/nginx/health.log main;
        return 200 '{"status":"UP","components":{"gateway":{"status":"UP"}}}';
        add_header Content-Type application/json;
    }

    # Metrics endpoint (simulado)
    location /actuator/prometheus {
        access_log /var/log/nginx/metrics.log main;
        return 200 '# HELP nginx_requests_total Total number of requests
# TYPE nginx_requests_total counter
nginx_requests_total 150

# HELP nginx_request_duration_seconds Request duration
# TYPE nginx_request_duration_seconds histogram
nginx_request_duration_seconds_bucket{le="0.1"} 75
nginx_request_duration_seconds_bucket{le="0.5"} 120
nginx_request_duration_seconds_bucket{le="1.0"} 140
nginx_request_duration_seconds_bucket{le="+Inf"} 150
nginx_request_duration_seconds_sum 68.2
nginx_request_duration_seconds_count 150';
        add_header Content-Type text/plain;
    }

    # Mock Gateway routes
    location /api/lista-espera/ {
        access_log /var/log/nginx/lista-espera.log main;
        proxy_pass http://mock_services/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/reasignacion/ {
        access_log /var/log/nginx/reasignacion.log main;
        proxy_pass http://mock_services/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/notificaciones/ {
        access_log /var/log/nginx/notificaciones.log main;
        proxy_pass http://mock_services/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback endpoints
    location /fallback/lista-espera {
        access_log /var/log/nginx/fallback.log main;
        return 503 '{"timestamp":"2024-04-24T17:10:00Z","status":"SERVICE_UNAVAILABLE","service":"lista-espera","message":"Servicio de lista de espera temporalmente no disponible","retryAfter":"30s"}';
        add_header Content-Type application/json;
    }

    location /fallback/reasignacion {
        access_log /var/log/nginx/fallback.log main;
        return 503 '{"timestamp":"2024-04-24T17:10:00Z","status":"SERVICE_UNAVAILABLE","service":"reasignacion","message":"Servicio de reasignación temporalmente no disponible","retryAfter":"30s"}';
        add_header Content-Type application/json;
    }

    location /fallback/notificaciones {
        access_log /var/log/nginx/fallback.log main;
        return 503 '{"timestamp":"2024-04-24T17:10:00Z","status":"SERVICE_UNAVAILABLE","service":"notificaciones","message":"Servicio de notificaciones temporalmente no disponible","retryAfter":"30s"}';
        add_header Content-Type application/json;
    }

    # Nginx status for Prometheus
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Default location
    location / {
        access_log /var/log/nginx/default.log main;
        return 404 '{"error":"Not Found","message":"Endpoint not found"}';
        add_header Content-Type application/json;
    }
}
