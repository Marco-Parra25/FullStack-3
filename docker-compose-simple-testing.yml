version: '3.8'

services:
  # Prometheus
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=1d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus-config-simple.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - rednorte-network

  # Grafana
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/grafana-provisioning.yml:/etc/grafana/provisioning/datasources.yml
    depends_on:
      - prometheus
    networks:
      - rednorte-network

  # Mock API Gateway (usando nginx como proxy simple)
  mock-gateway:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./testing/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./testing/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - prometheus
    networks:
      - rednorte-network

  # Mock Service 1 - MS Lista Espera
  mock-lista-espera:
    image: mockserver/mockserver:latest
    ports:
      - "8081:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    volumes:
      - ./testing/mock-services/lista-espera:/config
    networks:
      - rednorte-network

  # Mock Service 2 - MS Reasignación
  mock-reasignacion:
    image: mockserver/mockserver:latest
    ports:
      - "8082:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    volumes:
      - ./testing/mock-services/reasignacion:/config
    networks:
      - rednorte-network

  # Mock Service 3 - MS Notificaciones
  mock-notificaciones:
    image: mockserver/mockserver:latest
    ports:
      - "8083:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    volumes:
      - ./testing/mock-services/notificaciones:/config
    networks:
      - rednorte-network

volumes:
  prometheus-data:
  grafana-data:

networks:
  rednorte-network:
    driver: bridge
