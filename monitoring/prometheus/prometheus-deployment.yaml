apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: rednorte
  labels:
    app: prometheus
    component: monitoring
    version: v2.47.0
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubernetes.io/description: "Prometheus - Sistema de monitoreo para RedNorte"

spec:
  replicas: 1
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
        version: v2.47.0
      annotations:
        prometheus.io/scrape: "false"  # Prometheus no se auto-scrapea

    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0

      containers:
      - name: prometheus
        image: prom/prometheus:v2.47.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
          name: web
          protocol: TCP

        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus/'
          - '--web.console.libraries=/etc/prometheus/console_libraries'
          - '--web.console.templates=/etc/prometheus/consoles'
          - '--storage.tsdb.retention.time=15d'
          - '--web.enable-lifecycle'
          - '--web.enable-admin-api'
          - '--storage.tsdb.wal-compression'

        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        # Volume mounts
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus/
          readOnly: true
        - name: storage-volume
          mountPath: /prometheus/
        - name: rules-volume
          mountPath: /etc/prometheus/rules/
          readOnly: true

        # Resources
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      # Volumes
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
          items:
          - key: prometheus.yml
            path: prometheus.yml

      - name: rules-volume
        configMap:
          name: prometheus-rules
          optional: true

      - name: storage-volume
        persistentVolumeClaim:
          claimName: prometheus-pvc

      # Node selector
      nodeSelector:
        kubernetes.io/os: linux
        # Para producción, agregar node-type: monitoring

      # Tolerations para nodos dedicados
      tolerations:
      - key: "monitoring"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 300
