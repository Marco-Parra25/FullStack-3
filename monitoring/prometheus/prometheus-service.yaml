apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: rednorte
  labels:
    app: prometheus
    component: monitoring
    service-type: internal
  annotations:
    prometheus.io/scrape: "false"
    kubernetes.io/description: "Service interno para Prometheus"

spec:
  type: ClusterIP
  ports:
  - name: web
    port: 9090
    targetPort: 9090
    protocol: TCP

  selector:
    app: prometheus

---
# Service externo para acceso desde fuera del cluster (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: prometheus-external
  namespace: rednorte
  labels:
    app: prometheus
    component: monitoring
    service-type: external
  annotations:
    kubernetes.io/description: "Service externo para Prometheus - acceso público"
    # Para cloud providers específicos
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

spec:
  type: LoadBalancer
  ports:
  - name: web
    port: 9090
    targetPort: 9090
    protocol: TCP

  selector:
    app: prometheus

  # Para producción, configurar health checks del LoadBalancer
  # externalTrafficPolicy: Local
