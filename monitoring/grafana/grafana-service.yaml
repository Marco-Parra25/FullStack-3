apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: rednorte
  labels:
    app: grafana
    component: monitoring
    service-type: internal
  annotations:
    prometheus.io/scrape: "false"
    kubernetes.io/description: "Service interno para Grafana"

spec:
  type: ClusterIP
  ports:
  - name: web
    port: 3000
    targetPort: 3000
    protocol: TCP

  selector:
    app: grafana

---
# Service externo para acceso desde fuera del cluster (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: grafana-external
  namespace: rednorte
  labels:
    app: grafana
    component: monitoring
    service-type: external
  annotations:
    kubernetes.io/description: "Service externo para Grafana - acceso público"
    # Para cloud providers específicos
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

spec:
  type: LoadBalancer
  ports:
  - name: web
    port: 3000
    targetPort: 3000
    protocol: TCP

  selector:
    app: grafana

  # Para producción, configurar health checks del LoadBalancer
  # externalTrafficPolicy: Local
