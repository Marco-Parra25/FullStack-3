apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: rednorte
  labels:
    app: grafana
    component: secrets
  annotations:
    description: "Secrets para configuración de Grafana"

type: Opaque

data:
  # Credenciales de administrador (base64 encoded)
  admin-user: YWRtaW4=  # admin
  admin-password: YWRtaW4xMjM=  # admin123
  
  # Secret key para sesiones (base64 encoded)
  secret-key: Z3JhZmFuYS1zZWNyZXQta2V5LXJlZG5vcnRlLTIwMjQ=  # grafana-secret-key-rednorte-2024
  
  # Configuración SMTP (base64 encoded)
  smtp-user: Z3JhZmFuYUByZWRub3J0ZS5jbA==  # grafana@rednorte.cl
  smtp-password: eW91ci1hcHAtcGFzc3dvcmQ=  # your-app-password
  
stringData:
  # Descripción de los secrets
  admin-username: "admin"
  admin-password-hint: "Cambiar en producción"
  smtp-configuration: "Configurar con Gmail App Password"
