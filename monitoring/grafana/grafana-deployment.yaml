apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: rednorte
  labels:
    app: grafana
    component: monitoring
    version: v10.2.0
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubernetes.io/description: "Grafana - Visualización de métricas para RedNorte"

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana
        component: monitoring
        version: v10.2.0
      annotations:
        prometheus.io/scrape: "false"  # Grafana no se auto-scrapea

    spec:
      serviceAccountName: grafana
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472

      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: web
          protocol: TCP

        env:
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: admin-user
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: admin-password
        - name: GF_SECURITY_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: secret-key
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel,grafana-simple-json-datasource"
        - name: GF_PATHS_DATA
          value: /var/lib/grafana
        - name: GF_PATHS_LOGS
          value: /var/log/grafana
        - name: GF_PATHS_PLUGINS
          value: /var/lib/grafana/plugins
        - name: GF_PATHS_PROVISIONING
          value: /etc/grafana/provisioning
        - name: GF_SMTP_ENABLED
          value: "true"
        - name: GF_SMTP_HOST
          value: "smtp.gmail.com:587"
        - name: GF_SMTP_USER
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: smtp-user
        - name: GF_SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: smtp-password
        - name: GF_SMTP_FROM_ADDRESS
          value: "grafana@rednorte.cl"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_AUTH_BASIC_ENABLED
          value: "true"
        - name: GF_AUTH_LDAP_ENABLED
          value: "false"
        - name: GF_SERVER_DOMAIN
          value: "grafana.rednorte.cl"
        - name: GF_SERVER_ROOT_URL
          value: "https://grafana.rednorte.cl"
        - name: GF_SERVER_PROTOCOL
          value: "http"
        - name: GF_SERVER_HTTP_PORT
          value: "3000"
        - name: GF_LOG_LEVEL
          value: "info"
        - name: GF_LOG_MODE
          value: "console,file"
        - name: GF_EXPLORE_ENABLED
          value: "true"
        - name: GF_METRICS_ENABLED
          value: "true"
        - name: GF_ANALYTICS_REPORTING_ENABLED
          value: "false"
        - name: GF_SECURITY_ALLOW_EMBEDDING
          value: "true"

        # Volume mounts
        volumeMounts:
        - name: config-volume
          mountPath: /etc/grafana
          readOnly: true
        - name: provisioning-volume
          mountPath: /etc/grafana/provisioning
          readOnly: true
        - name: storage-volume
          mountPath: /var/lib/grafana
        - name: logs-volume
          mountPath: /var/log/grafana

        # Resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      # Volumes
      volumes:
      - name: config-volume
        configMap:
          name: grafana-config
          items:
          - key: grafana.ini
            path: grafana.ini

      - name: provisioning-volume
        configMap:
          name: grafana-provisioning

      - name: storage-volume
        persistentVolumeClaim:
          claimName: grafana-pvc

      - name: logs-volume
        emptyDir: {}

      # Node selector
      nodeSelector:
        kubernetes.io/os: linux

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 60
