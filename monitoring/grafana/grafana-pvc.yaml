apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: rednorte
  labels:
    app: grafana
    component: storage
  annotations:
    description: "PVC para almacenamiento de datos de Grafana"

spec:
  accessModes:
    - ReadWriteOnce
  
  storageClassName: fast-ssd  # Ajustar según el cloud provider
  
  resources:
    requests:
      storage: 10Gi  # Suficiente para dashboards y configuración

  # Para producción, considerar:
  # - volumeMode: Filesystem
  # - selector para PVs específicos
