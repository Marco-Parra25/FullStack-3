apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: rednorte
  labels:
    app: kibana
    component: logging
    service-type: internal
  annotations:
    prometheus.io/scrape: "false"
    kubernetes.io/description: "Service interno para Kibana"

spec:
  type: ClusterIP
  ports:
  - name: http
    port: 5601
    targetPort: 5601
    protocol: TCP

  selector:
    app: kibana

---
# Service externo para acceso desde fuera del cluster (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: kibana-external
  namespace: rednorte
  labels:
    app: kibana
    component: logging
    service-type: external
  annotations:
    kubernetes.io/description: "Service externo para Kibana - acceso público"

spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 5601
    targetPort: 5601
    protocol: TCP

  selector:
    app: kibana
