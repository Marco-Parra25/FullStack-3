apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: rednorte
  labels:
    app: elasticsearch
    component: logging
    service-type: internal
  annotations:
    prometheus.io/scrape: "false"
    kubernetes.io/description: "Service interno para Elasticsearch"

spec:
  type: ClusterIP
  ports:
  - name: http
    port: 9200
    targetPort: 9200
    protocol: TCP
  - name: transport
    port: 9300
    targetPort: 9300
    protocol: TCP

  selector:
    app: elasticsearch

---
# Service externo para acceso desde fuera del cluster (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-external
  namespace: rednorte
  labels:
    app: elasticsearch
    component: logging
    service-type: external
  annotations:
    kubernetes.io/description: "Service externo para Elasticsearch - acceso público"

spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 9200
    targetPort: 9200
    protocol: TCP
  - name: transport
    port: 9300
    targetPort: 9300
    protocol: TCP

  selector:
    app: elasticsearch
