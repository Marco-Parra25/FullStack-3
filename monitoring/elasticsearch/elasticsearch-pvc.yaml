apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: rednorte
  labels:
    app: elasticsearch
    component: logging
  annotations:
    description: "PVC para almacenamiento de datos de Elasticsearch"

spec:
  accessModes:
    - ReadWriteOnce
  
  storageClassName: fast-ssd  # Ajustar según el cloud provider
  
  resources:
    requests:
      storage: 30Gi  # Suficiente para logs del sistema

  # Para producción, considerar:
  # - volumeMode: Filesystem
  # - selector para PVs específicos
