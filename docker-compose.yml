services:

  # ─── BASES DE DATOS ───────────────────────────────────────────────
  postgres-lista-espera:
    image: postgres:15-alpine
    container_name: postgres-lista-espera
    environment:
      POSTGRES_DB: lista_espera_db
      POSTGRES_USER: rednorte
      POSTGRES_PASSWORD: rednorte123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rednorte -d lista_espera_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rednorte-network

  postgres-reasignacion:
    image: postgres:15-alpine
    container_name: postgres-reasignacion
    environment:
      POSTGRES_DB: reasignacion_db
      POSTGRES_USER: rednorte
      POSTGRES_PASSWORD: rednorte123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rednorte -d reasignacion_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rednorte-network

  # ─── KAFKA ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - rednorte-network

  # ─── KEYCLOAK ─────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
      KC_HTTP_PORT: 8090
    ports:
      - "8090:8090"
    networks:
      - rednorte-network

  # ─── MICROSERVICIOS ───────────────────────────────────────────────
  ms-lista-espera:
    build:
      context: ./rednorte-project/ms-lista-espera
      dockerfile: Dockerfile
    container_name: ms-lista-espera
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-lista-espera:5432/lista_espera_db
      SPRING_DATASOURCE_USERNAME: rednorte
      SPRING_DATASOURCE_PASSWORD: rednorte123
      SPRING_FLYWAY_ENABLED: "true"
      SERVER_PORT: 8081
    depends_on:
      postgres-lista-espera:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5
    networks:
      - rednorte-network

  ms-reasignacion:
    build:
      context: ./ms-reasignacion
      dockerfile: Dockerfile
    container_name: ms-reasignacion
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-reasignacion:5432/reasignacion_db
      SPRING_DATASOURCE_USERNAME: rednorte
      SPRING_DATASOURCE_PASSWORD: rednorte123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8082
    depends_on:
      postgres-reasignacion:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - rednorte-network

  ms-api-gateway:
    build:
      context: ./ms-api-gateway
      dockerfile: Dockerfile
    container_name: ms-api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
    depends_on:
      ms-lista-espera:
        condition: service_healthy
      ms-reasignacion:
        condition: service_started
    networks:
      - rednorte-network

  # ─── BFF ──────────────────────────────────────────────────────────
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: bff
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      API_GATEWAY_URL: http://ms-api-gateway:8080
    depends_on:
      - ms-api-gateway
    networks:
      - rednorte-network

  # ─── FRONTEND ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - bff
    networks:
      - rednorte-network

  # ─── MONITOREO ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - rednorte-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rednorte-network

networks:
  rednorte-network:
    driver: bridge

volumes:
  grafana-data:
