version: '3.9'

services:
  # ── PostgreSQL para MS Lista de Espera ──
  postgres-lista-espera:
    image: postgres:16-alpine
    container_name: pg-lista-espera
    environment:
      POSTGRES_DB: lista_espera_db
      POSTGRES_USER: rednorte
      POSTGRES_PASSWORD: rednorte123
    ports:
      - "5432:5432"
    volumes:
      - pg_lista_espera_data:/var/lib/postgresql/data
    networks:
      - rednorte-net

  # ── PostgreSQL para MS Reasignación ──
  postgres-reasignacion:
    image: postgres:16-alpine
    container_name: pg-reasignacion
    environment:
      POSTGRES_DB: reasignacion_db
      POSTGRES_USER: rednorte
      POSTGRES_PASSWORD: rednorte123
    ports:
      - "5433:5432"
    volumes:
      - pg_reasignacion_data:/var/lib/postgresql/data
    networks:
      - rednorte-net

  # ── PostgreSQL para MS Notificaciones ──
  postgres-notificaciones:
    image: postgres:16-alpine
    container_name: pg-notificaciones
    environment:
      POSTGRES_DB: notificaciones_db
      POSTGRES_USER: rednorte
      POSTGRES_PASSWORD: rednorte123
    ports:
      - "5434:5432"
    volumes:
      - pg_notificaciones_data:/var/lib/postgresql/data
    networks:
      - rednorte-net

  # ── Apache Kafka (KRaft mode, sin Zookeeper) ──
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - rednorte-net

  # ── Keycloak (Autenticación OAuth2 + JWT) ──
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    networks:
      - rednorte-net

volumes:
  pg_lista_espera_data:
  pg_reasignacion_data:
  pg_notificaciones_data:

networks:
  rednorte-net:
    driver: bridge
