services:
  postgres-lista-espera:
    image: postgres:16-alpine
    container_name: pg-lista-espera
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lista_espera_db}
      POSTGRES_USER: ${POSTGRES_USER:-rednorte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pg_lista_espera_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lista-espera-net

  ms-lista-espera:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-lista-espera
    depends_on:
      postgres-lista-espera:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres-lista-espera:5432/lista_espera_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-rednorte}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    networks:
      - lista-espera-net

volumes:
  pg_lista_espera_data:

networks:
  lista-espera-net:
    driver: bridge
