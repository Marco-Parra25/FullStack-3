apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-lista-espera
  labels:
    app: postgres-lista-espera
spec:
  serviceName: postgres-lista-espera
  replicas: 1
  selector:
    matchLabels:
      app: postgres-lista-espera
  template:
    metadata:
      labels:
        app: postgres-lista-espera
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: lista_espera_db
            - name: POSTGRES_USER
              value: rednorte
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-lista-espera-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U rednorte -d lista_espera_db
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U rednorte -d lista_espera_db
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
