server:
  port: 8080

spring:
  application:
    name: ms-api-gateway

  cloud:
    gateway:
      # Configuración CORS global
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600

      routes:
        # MS Lista de Espera
        - id: ms-lista-espera
          uri: http://ms-lista-espera:8081
          predicates:
            - Path=/api/v1/waitlist/**,/api/v1/pacientes/**

        # MS Reasignación
        - id: ms-reasignacion
          uri: http://ms-reasignacion:8082
          predicates:
            - Path=/api/v1/reasignacion/**

# Configuración de Actuator para monitoreo
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Configuración de Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      listaEsperaCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      reasignacionCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50

# Logging
logging:
  level:
    org.springframework.cloud.gateway: INFO
    cl.rednorte: DEBUG
