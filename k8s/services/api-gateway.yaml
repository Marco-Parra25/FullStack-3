apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: rednorte
  labels:
    app: ms-api-gateway
    component: backend
    service-type: internal
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
    kubernetes.io/description: "Service interno para API Gateway"

spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: management
    port: 8081
    targetPort: 8080
    protocol: TCP

  selector:
    app: ms-api-gateway

---
# Service externo para acceso desde fuera del cluster (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-external
  namespace: rednorte
  labels:
    app: ms-api-gateway
    component: backend
    service-type: external
  annotations:
    kubernetes.io/description: "Service externo para API Gateway - acceso público"
    # Para cloud providers específicos
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    # service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"

spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8080
    protocol: TCP

  selector:
    app: ms-api-gateway

  # Para producción, configurar health checks del LoadBalancer
  # externalTrafficPolicy: Local
