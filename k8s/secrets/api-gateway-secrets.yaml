apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
  namespace: rednorte
  labels:
    app: ms-api-gateway
    component: secrets
type: Opaque
data:
  # Base64 encoded values
  # Para producción, estos valores deben ser generados y almacenados de forma segura
  keycloak-client-secret: <BASE64_ENCODED_CLIENT_SECRET>
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD>
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
