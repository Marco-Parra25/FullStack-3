apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rednorte
  labels:
    app: ms-api-gateway
    component: backend
    version: v1.0.0
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubernetes.io/description: "API Gateway para el sistema de salud RedNorte"

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: ms-api-gateway

  template:
    metadata:
      labels:
        app: ms-api-gateway
        component: backend
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"

    spec:
      containers:
      - name: api-gateway
        image: rednorte/api-gateway:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseG1GC"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info,metrics,prometheus,circuitbreakers,ratelimiters"

        # ConfigMap con configuración
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true

        # Secrets sensibles
        - name: secrets-volume
          mountPath: /app/secrets
          readOnly: true

        # Health checks
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        # Logging
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOGGING_PATTERN_CONSOLE
          value: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

      volumes:
      - name: config-volume
        configMap:
          name: api-gateway-config
          items:
          - key: application.yml
            path: application.yml

      - name: secrets-volume
        secret:
          secretName: api-gateway-secrets
          optional: true

      # Node selector y tolerations para producción
      nodeSelector:
        kubernetes.io/os: linux

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 30
