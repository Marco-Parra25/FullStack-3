apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: rednorte
  labels:
    app: ms-api-gateway
    component: autoscaling
  annotations:
    kubernetes.io/description: "HPA para API Gateway basado en métricas personalizadas"

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway

  # Configuración de escalado
  minReplicas: 2
  maxReplicas: 10
  
  # Comportamiento del escalado
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

  # Métricas para el escalado
  metrics:
  # Métrica de CPU
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # Métrica de memoria
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  # Métricas personalizadas de Prometheus (requiere Prometheus Adapter)
  - type: External
    external:
      metric:
        name: http_requests_per_second
        selector:
          matchLabels:
            app: ms-api-gateway
      target:
        type: AverageValue
        averageValue: "100"

  # Métrica de conexiones concurrentes
  - type: External
    external:
      metric:
        name: concurrent_connections
        selector:
          matchLabels:
            app: ms-api-gateway
      target:
        type: AverageValue
        averageValue: "50"

  # Métrica de latencia de respuesta
  - type: External
    external:
      metric:
        name: http_request_duration_seconds
        selector:
          matchLabels:
            app: ms-api-gateway
      target:
        type: AverageValue
        averageValue: "0.5"
