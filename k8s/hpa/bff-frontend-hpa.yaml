apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bff-frontend-hpa
  namespace: rednorte
  labels:
    app: bff-frontend
    component: autoscaling
  annotations:
    kubernetes.io/description: "HPA para BFF Frontend basado en CPU y memoria"

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bff-frontend

  # Configuración de escalado
  minReplicas: 2
  maxReplicas: 8
  
  # Comportamiento del escalado
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

  # Métricas para el escalado
  metrics:
  # Métrica de CPU
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # Métrica de memoria
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
